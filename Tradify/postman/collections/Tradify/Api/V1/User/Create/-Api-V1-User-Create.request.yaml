$kind: http-request
name: /Api/V1/User/Create
url: "{{baseUrl}}/Api/V1/User/Create"
method: POST
headers:
  Content-Type: multipart/form-data
body:
  type: formdata
  content:
    - type: text
      key: EmailOrPhone
      value: string
    - type: text
      key: UserName
      value: string
    - type: text
      key: Password
      value: string
    - type: text
      key: ConfirmPassword
      value: string
examples: ./.resources/-Api-V1-User-Create.resources/examples
order: 1000
