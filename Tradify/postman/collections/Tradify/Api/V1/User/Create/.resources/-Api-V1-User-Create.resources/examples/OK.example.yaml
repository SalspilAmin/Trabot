$kind: http-example
request:
  url: "{{baseUrl}}/Api/V1/User/Create"
  method: POST
  headers:
    Content-Type: multipart/form-data
  body:
    type: formdata
    content:
      - type: text
        key: EmailOrPhone
        value: string
      - type: text
        key: UserName
        value: string
      - type: text
        key: Password
        value: string
      - type: text
        key: ConfirmPassword
        value: string
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
