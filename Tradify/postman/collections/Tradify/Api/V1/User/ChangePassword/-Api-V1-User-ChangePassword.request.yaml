$kind: http-request
name: /Api/V1/User/ChangePassword
url: "{{baseUrl}}/Api/V1/User/ChangePassword"
method: PUT
headers:
  Content-Type: multipart/form-data
body:
  type: formdata
  content:
    - type: text
      key: Id
      value: "334"
    - type: text
      key: CurrentPassword
      value: string
    - type: text
      key: NewPassword
      value: string
    - type: text
      key: ConfirmPassword
      value: string
examples: ./.resources/-Api-V1-User-ChangePassword.resources/examples
order: 1000
