$kind: http-example
request:
  url: "{{baseUrl}}/Api/V1/Store/AddStore"
  method: POST
  headers:
    Content-Type: multipart/form-data
  body:
    type: formdata
    content:
      - type: text
        key: Name
        value: string
      - type: text
        key: Description
        value: string
