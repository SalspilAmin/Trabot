$kind: http-example
request:
  url: "{{baseUrl}}/Api/V1/Authentication/RefreshToken"
  method: PUT
  headers:
    Content-Type: multipart/form-data
  body:
    type: formdata
    content:
      - type: text
        key: Accesstoken
        value: string
      - type: text
        key: RefreshToken
        value: string
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
