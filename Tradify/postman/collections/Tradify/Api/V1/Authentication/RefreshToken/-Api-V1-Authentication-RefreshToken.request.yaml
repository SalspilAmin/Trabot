$kind: http-request
name: /Api/V1/Authentication/RefreshToken
url: "{{baseUrl}}/Api/V1/Authentication/RefreshToken"
method: PUT
headers:
  Content-Type: multipart/form-data
body:
  type: formdata
  content:
    - type: text
      key: Accesstoken
      value: string
    - type: text
      key: RefreshToken
      value: string
examples: ./.resources/-Api-V1-Authentication-RefreshToken.resources/examples
order: 1000
